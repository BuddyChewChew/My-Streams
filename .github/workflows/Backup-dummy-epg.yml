name: ▶️ Backup-dummy-epg

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:       # Allows manual runs

permissions:
  contents: write

jobs:
  update-dummy-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run dummy EPG generator
        run: cd Backup && python Backup-dummy-epg.py

      - name: Commit and push changes
        run: |
          git config --global user.name "actions-user"
          git config --global user.email "actions@github.com"
          git add Backup/epg.xml Backup/epg_ids.txt
          git diff --staged --quiet || git commit -m "🔄 Update dummy EPG"
          git push --force
